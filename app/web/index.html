<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Likha Pet — Filipino-inspired AI pet strategy game">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>app</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- ── Mobile crash catcher ──────────────────────────────────────────────
       Captures JS/OOM errors before Flutter even starts, and shows them
       on screen so you can debug without desktop devtools.
       The overlay is hidden once Flutter mounts successfully.
  -->
  <div id="crash-overlay" style="
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:#0a0e1a; color:#ff6060; font-family:monospace;
    font-size:13px; padding:20px; overflow:auto; z-index:99999;
    white-space:pre-wrap; word-break:break-all;">
    <b style="font-size:16px; color:#ff4040">⚠ Crash Report</b><br><br>
    <span id="crash-msg">Loading…</span>
  </div>
  <script>
    var _crashLogs = [];
    function _showCrash(msg) {
      var el = document.getElementById('crash-overlay');
      var msgEl = document.getElementById('crash-msg');
      if (el && msgEl) {
        msgEl.textContent = msg;
        el.style.display = 'block';
      }
    }
    // Catch synchronous JS errors (OOM, type errors, etc.)
    window.onerror = function(msg, src, line, col, err) {
      var text = 'JS Error\n' + msg + '\nat ' + src + ':' + line + ':' + col;
      if (err && err.stack) text += '\n\nStack:\n' + err.stack;
      _crashLogs.push(text);
      _showCrash(_crashLogs.join('\n\n---\n\n'));
    };
    // Catch unhandled promise rejections (async Dart/JS errors)
    window.onunhandledrejection = function(e) {
      var reason = e.reason ? (e.reason.stack || String(e.reason)) : String(e);
      var text = 'Unhandled Promise Rejection:\n' + reason;
      _crashLogs.push(text);
      _showCrash(_crashLogs.join('\n\n---\n\n'));
    };
    // Hide the overlay once Flutter signals it is ready
    window._flutterAppReady = function() {
      var el = document.getElementById('crash-overlay');
      if (el) el.style.display = 'none';
    };
  </script>
  <!--
    Mobile renderer intercept — must run BEFORE flutter_bootstrap.js.
    On iOS/Android, CanvasKit (WebGL) crashes. This Proxy wraps window._flutter
    so that when Flutter sets _flutter.loader it immediately patches load() to
    call initializeEngine({renderer:'html'}) instead of the default CanvasKit.
    Proxy is fully supported on iOS 10+ and all modern Android browsers.
  -->
  <script>
  (function() {
    if (!/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) return;

    // On iOS/Android: force HTML renderer by injecting an 'html' build entry
    // into _flutter.buildConfig and passing config.renderer = 'html' to load().
    //
    // Why this works better than initializeEngine({renderer:'html'}):
    //   Flutter 3.41 selects the renderer during load() — if the chosen build
    //   has renderer:'canvaskit', CanvasKit WASM is preloaded and the engine
    //   commits to CanvasKit before initializeEngine is even called.
    //   By injecting an 'html' build and using config.renderer='html', the
    //   loader picks the html build from the start and never touches CanvasKit.

    window._flutter = new Proxy({}, {
      set: function(target, prop, value) {
        if (prop === 'buildConfig' && value && Array.isArray(value.builds)) {
          // Prepend html renderer build — same JS file, no CanvasKit needed.
          value.builds.unshift({
            compileTarget: 'dart2js',
            renderer: 'html',
            mainJsPath: 'main.dart.js'
          });
        }
        if (prop === 'loader' && value && typeof value.load === 'function') {
          var origLoad = value.load.bind(value);
          value.load = function(config) {
            config = Object.assign({}, config || {});
            // config.config is the engine config sub-object; renderer here
            // is what the loader uses to select from buildConfig.builds.
            config.config = Object.assign({}, config.config || {}, { renderer: 'html' });
            return origLoad(config);
          };
        }
        target[prop] = value;
        return true;
      },
      get: function(target, prop) { return target[prop]; }
    });
  })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
