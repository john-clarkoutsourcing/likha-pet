name: likha_pet
description: Filipino-inspired AI pet strategy game with 3v3 turn-based battles.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Battle engine (pure Dart, no Flutter imports)
  likha_pet_battle_engine:
    path: ../battle_engine

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Persistence
  shared_preferences: ^2.3.4
  uuid: ^4.5.1

  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  flame: ^1.37.0
  flame_spine: ^0.3.0+5
  spine_flutter: ^4.3.1
  flutter_secure_storage: ^10.2.0
  http: ^1.6.0
  webview_flutter: ^4.10.0
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    # UI & backgrounds
    - assets/images/
    - assets/images/bg2/
    - assets/images/cards/
    - assets/images/ui/
    - assets/images/icons/
    - assets/images/part-icons/
    - assets/images/status/
    - assets/images/reference/
    # Creature sprite fallbacks
    - assets/sprites/
    # Spine skeletal animations — all 15 starter creatures + dusk
    - assets/spines/aquatic/
    - assets/spines/plant/
    - assets/spines/beast/
    - assets/spines/bug/
    - assets/spines/reptile/
    - assets/spines/bird/
    - assets/spines/dusk/
    - assets/spines/soul/
    # Shared mixer atlas — one 4096×4096 PNG contains ALL body parts for ALL classes
    - assets/spines/mixer/
    # Creature data (genes, animations, samples, variants)
    - assets/data/
    # Audio
    - assets/audio/
