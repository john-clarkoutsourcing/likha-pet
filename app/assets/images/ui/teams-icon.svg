<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="teamGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g filter="url(#teamGlow)">
    <!-- Formation connector lines -->
    <line x1="14" y1="49" x2="32" y2="22" stroke="#4ac4d9" stroke-width="1.2" stroke-opacity="0.45" stroke-dasharray="2.5,2.5"/>
    <line x1="50" y1="49" x2="32" y2="22" stroke="#4ac4d9" stroke-width="1.2" stroke-opacity="0.45" stroke-dasharray="2.5,2.5"/>
    <line x1="14" y1="49" x2="50" y2="49" stroke="#4ac4d9" stroke-width="1" stroke-opacity="0.28"/>

    <!-- ── MID pet (center-top, hero, cyan) ── -->
    <!-- Crown -->
    <path d="M29 9 L 32 5 L 35 9" fill="none" stroke="#FFD740" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="32" cy="5" r="1.5" fill="#FFD740"/>
    <!-- Body -->
    <path d="M32 11 C 26 11, 22 17, 23 23 C 24 27, 27 31, 32 31 C 37 31, 40 27, 41 23 C 42 17, 38 11, 32 11 Z" fill="#4ac4d9"/>
    <!-- Ears -->
    <path d="M23 17 L 19 13 L 21 20 Z" fill="#4ac4d9"/>
    <path d="M41 17 L 45 13 L 43 20 Z" fill="#4ac4d9"/>
    <!-- Eyes -->
    <circle cx="28" cy="21" r="1.9" fill="#0a1224"/>
    <circle cx="36" cy="21" r="1.9" fill="#0a1224"/>
    <!-- Cheeks -->
    <circle cx="25" cy="26" r="1.5" fill="#e85aa8" opacity="0.9"/>
    <circle cx="39" cy="26" r="1.5" fill="#e85aa8" opacity="0.9"/>

    <!-- ── FRONT pet (bottom-left, defender red) ── -->
    <path d="M14 37 C 10 37, 7.5 41, 8 45 C 8.5 48, 11 51, 14 51 C 17 51, 19.5 48, 20 45 C 20.5 41, 18 37, 14 37 Z" fill="#FF5252"/>
    <!-- Ears -->
    <path d="M8 41 L 5.5 38 L 7 44 Z" fill="#FF5252"/>
    <path d="M20 41 L 22.5 38 L 21 44 Z" fill="#FF5252"/>
    <!-- Eyes -->
    <circle cx="12" cy="44" r="1.3" fill="#0a1224"/>
    <circle cx="16" cy="44" r="1.3" fill="#0a1224"/>

    <!-- ── BACK pet (bottom-right, support green) ── -->
    <path d="M50 37 C 46 37, 43.5 41, 44 45 C 44.5 48, 47 51, 50 51 C 53 51, 55.5 48, 56 45 C 56.5 41, 54 37, 50 37 Z" fill="#69F0AE"/>
    <!-- Ears -->
    <path d="M44 41 L 41.5 38 L 43 44 Z" fill="#69F0AE"/>
    <path d="M56 41 L 58.5 38 L 57 44 Z" fill="#69F0AE"/>
    <!-- Eyes -->
    <circle cx="48" cy="44" r="1.3" fill="#0a1224"/>
    <circle cx="52" cy="44" r="1.3" fill="#0a1224"/>
  </g>
</svg>
